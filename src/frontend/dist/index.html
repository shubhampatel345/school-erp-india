    <script>
      // Apply saved theme BEFORE React renders — prevents flash of wrong theme
      (function() {
        try {
          var themeId = localStorage.getItem('shubh_erp_theme') || 'default';
          var root = document.documentElement;
          var themeMap = {
            'ocean': 'ocean',
            'forest': 'forest',
            'rose': 'rose',
            'dark-navy': 'dark',
            'slate': 'slate',
            'purple': 'purple',
            'copper': 'copper',
            'cherry': 'cherry',
            'midnight': 'midnight'
          };
          root.removeAttribute('data-theme');
          root.classList.remove('dark');
          if (themeId !== 'default') {
            var dt = themeMap[themeId];
            if (dt === 'dark') {
              root.classList.add('dark');
            } else if (dt) {
              root.setAttribute('data-theme', dt);
            }
          }
        } catch(e) {}
      })();
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
